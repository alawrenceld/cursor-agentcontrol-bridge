<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent usage report</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222c;
      --text: #e7ecf1;
      --muted: #8b9aab;
      --line: #2a3542;
      --accent: #3d8bfd;
      --good: #3ecf8e;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% -10%, #1b2a3d, transparent), var(--bg);
      color: var(--text); padding: 32px 28px 48px;
    }
    h1 { font-size: 1.5rem; font-weight: 650; margin: 0 0 4px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); margin-bottom: 20px; font-size: 0.95rem; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: end; margin-bottom: 20px;
    }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--muted); }
    select, button, input[type=file] {
      font: inherit; color: var(--text); background: var(--panel);
      border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px;
    }
    button { cursor: pointer; background: var(--accent); border-color: transparent; font-weight: 600; }
    button.secondary { background: var(--panel); border-color: var(--line); font-weight: 500; }
    .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .tile { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; }
    .tile .label { color: var(--muted); font-size: 12px; }
    .tile .value { font-size: 1.35rem; font-weight: 650; margin-top: 2px; font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); font-variant-numeric: tabular-nums; }
    th { color: var(--muted); font-size: 12px; font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    .banner { color: #f0c674; margin-bottom: 12px; font-size: 0.9rem; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <h1>Agent usage report</h1>
  <p class="sub">Exec / finance view over exported ledger data — filter by user and model, download CSV.</p>
  <div class="toolbar">
    <label>User
      <select id="user"><option value="">All users</option></select>
    </label>
    <label>Model
      <select id="model"><option value="">All models</option></select>
    </label>
    <button type="button" id="csv" class="secondary">Download CSV</button>
    <label>Load JSON
      <input type="file" id="file" accept="application/json,.json" />
    </label>
  </div>
  <div id="banner" class="banner" hidden></div>
  <div class="tiles" id="tiles"></div>
  <table>
    <thead>
      <tr><th>User</th><th>Model</th><th>Gen</th><th>Tokens</th><th>Duration</th><th>Provider</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <p class="meta" id="meta"></p>
  <script>
    const compact = (n) => !isFinite(n) ? '–'
      : Math.abs(n) >= 1e6 ? (n / 1e6).toFixed(1) + 'M'
      : Math.abs(n) >= 1e4 ? (n / 1e3).toFixed(1) + 'K'
      : Number(n).toLocaleString('en-US');
    const dur = (ms) => !ms ? '–' : ms < 60000 ? (ms / 1000).toFixed(1) + 's' : (ms / 60000).toFixed(1) + 'm';

    let data = null;

    function rowsFrom(data, userFilter, modelFilter) {
      const out = [];
      for (const u of data.users || []) {
        if (userFilter && u.userKey !== userFilter) continue;
        for (const v of u.byVariation || []) {
          if (modelFilter && v.variationKey !== modelFilter) continue;
          out.push({
            userKey: u.userKey,
            provider: u.provider || '',
            variationKey: v.variationKey,
            ...v.metrics,
          });
        }
      }
      return out;
    }

    function sumMetrics(rows) {
      const t = { generationCount: 0, totalTokens: 0, durationMs: 0, inputTokens: 0, outputTokens: 0 };
      for (const r of rows) {
        t.generationCount += r.generationCount || 0;
        t.totalTokens += r.totalTokens || 0;
        t.durationMs += r.durationMs || 0;
        t.inputTokens += r.inputTokens || 0;
        t.outputTokens += r.outputTokens || 0;
      }
      return t;
    }

    function render() {
      if (!data) return;
      const user = document.getElementById('user').value;
      const model = document.getElementById('model').value;
      const rows = rowsFrom(data, user, model);
      const t = sumMetrics(rows);
      document.getElementById('tiles').innerHTML = [
        ['Generations', compact(t.generationCount), ''],
        ['Tokens', compact(t.totalTokens), compact(t.inputTokens) + ' in · ' + compact(t.outputTokens) + ' out'],
        ['Duration', dur(t.durationMs), 'wall clock (hook)'],
        ['Rows', String(rows.length), 'user × model'],
      ].map(([label, value, sub]) =>
        '<div class="tile"><div class="label">' + label + '</div><div class="value">' + value + '</div>' +
        (sub ? '<div class="label">' + sub + '</div>' : '') + '</div>'
      ).join('');
      document.getElementById('rows').innerHTML = rows.map((r) =>
        '<tr><td>' + r.userKey + '</td><td>' + r.variationKey + '</td><td>' + compact(r.generationCount) +
        '</td><td>' + compact(r.totalTokens) + '</td><td>' + dur(r.durationMs) + '</td><td>' +
        (r.provider || '') + '</td></tr>'
      ).join('') || '<tr><td colspan="6">No rows for this filter.</td></tr>';
      document.getElementById('meta').textContent =
        'Window ' + (data.from || '') + ' → ' + (data.to || '') +
        ' · events ' + (data.eventCount ?? '–') +
        (data.sample ? ' · SAMPLE DATA' : '') +
        ' · Export with: npm run report:export';
    }

    function populateFilters(d) {
      const users = [...new Set((d.users || []).map((u) => u.userKey))].sort();
      const models = [...new Set((d.users || []).flatMap((u) => (u.byVariation || []).map((v) => v.variationKey)))].sort();
      const userSel = document.getElementById('user');
      const modelSel = document.getElementById('model');
      userSel.innerHTML = '<option value="">All users</option>' + users.map((u) => '<option>' + u + '</option>').join('');
      modelSel.innerHTML = '<option value="">All models</option>' + models.map((m) => '<option>' + m + '</option>').join('');
    }

    function load(d) {
      data = d;
      const banner = document.getElementById('banner');
      if (d.sample) {
        banner.hidden = false;
        banner.textContent = 'Showing sample data — run npm run report:export after agent runs to load your ledger.';
      } else {
        banner.hidden = true;
      }
      populateFilters(d);
      render();
    }

    async function boot() {
      for (const url of ['data/usage-summary.json', 'data/usage-summary.sample.json']) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;
          load(await res.json());
          return;
        } catch { /* try next */ }
      }
      document.getElementById('banner').hidden = false;
      document.getElementById('banner').textContent = 'No data — run npm run report:export or load a JSON file.';
    }

    document.getElementById('user').addEventListener('change', render);
    document.getElementById('model').addEventListener('change', render);
    document.getElementById('file').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      load(JSON.parse(await file.text()));
    });
    document.getElementById('csv').addEventListener('click', () => {
      if (!data) return;
      const user = document.getElementById('user').value;
      const model = document.getElementById('model').value;
      const rows = rowsFrom(data, user, model);
      const header = 'user,model,provider,generations,tokens,duration_ms';
      const lines = rows.map((r) =>
        [r.userKey, r.variationKey, r.provider, r.generationCount || 0, r.totalTokens || 0, r.durationMs || 0].join(',')
      );
      const blob = new Blob([[header, ...lines].join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'agent-usage.csv';
      a.click();
    });
    boot();
  </script>
</body>
</html>
